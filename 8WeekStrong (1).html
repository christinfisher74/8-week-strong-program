<title>8 Week Strong — Balance Fitness and Nutrition</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #4A7C59;
    --green-dark: #2d4f38;
    --green-light: #e8f0eb;
    --green-mid: #6a9d78;
    --cream: #faf8f4;
    --dark: #1e2420;
    --mid: #4a5249;
    --light: #8a9589;
    --accent: #c8a96e;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(30,36,32,0.10);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    background: var(--green-dark);
    padding: 32px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -20px;
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.03);
    border-radius: 50%;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 900;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
    letter-spacing: 1px;
  }

  /* WEEK SELECTOR */
  .week-nav {
    background: var(--white);
    padding: 16px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .week-nav-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 10px;
  }
  .week-pills {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .week-pills::-webkit-scrollbar { display: none; }
  .week-pill {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid var(--green-light);
    background: var(--green-light);
    color: var(--green);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .week-pill.active {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .week-pill:hover:not(.active) {
    border-color: var(--green-mid);
  }

  /* MAIN CONTENT */
  .container { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

  /* WEEK HERO */
  .week-hero {
    background: var(--green);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .week-hero::after {
    content: attr(data-week);
    position: absolute;
    right: -10px; top: -10px;
    font-family: 'Playfair Display', serif;
    font-size: 100px;
    font-weight: 900;
    color: rgba(255,255,255,0.08);
    line-height: 1;
  }
  .week-hero-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .week-hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
  }
  .week-hero-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    line-height: 1.6;
    font-weight: 300;
  }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--green-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--dark);
  }
  .card-subtitle {
    font-size: 12px;
    color: var(--light);
    margin-top: 2px;
  }

  /* WORKOUT */
  .exercise-list { display: flex; flex-direction: column; gap: 10px; }
  .exercise-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--cream);
    border-radius: 10px;
  }
  .exercise-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--green);
    color: white;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .exercise-info { flex: 1; }
  .exercise-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
  }
  .exercise-detail {
    font-size: 12px;
    color: var(--light);
    margin-top: 2px;
  }
  .exercise-check {
    width: 24px; height: 24px;
    border: 2px solid #ddd;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .exercise-check.done {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  /* NUTRITION */
  .nutrition-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .nutrition-card {
    background: var(--green-light);
    border-radius: 12px;
    padding: 14px;
  }
  .nutrition-card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green-dark);
    margin-bottom: 8px;
  }
  .nutrition-card p {
    font-size: 12.5px;
    color: var(--mid);
    line-height: 1.5;
  }
  .nutrition-tip {
    background: var(--cream);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--mid);
    line-height: 1.6;
    font-style: italic;
  }

  /* HABIT TRACKER */
  .habit-list { display: flex; flex-direction: column; gap: 8px; }
  .habit-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--cream);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .habit-item.checked {
    background: var(--green-light);
  }
  .habit-check {
    width: 22px; height: 22px;
    border: 2px solid #ccc;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 13px;
  }
  .habit-item.checked .habit-check {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .habit-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--dark);
    flex: 1;
  }
  .habit-item.checked .habit-label {
    color: var(--green-dark);
  }
  .habit-emoji { font-size: 18px; }

  /* JOURNAL */
  .journal-textarea {
    width: 100%;
    min-height: 100px;
    border: 2px solid var(--green-light);
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--dark);
    resize: none;
    outline: none;
    background: var(--cream);
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  .journal-textarea:focus {
    border-color: var(--green);
  }
  .journal-prompt {
    font-size: 13px;
    color: var(--light);
    margin-bottom: 10px;
    font-style: italic;
  }
  .save-btn {
    margin-top: 10px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .save-btn:hover { background: var(--green-dark); }
  .saved-note {
    font-size: 12px;
    color: var(--green);
    margin-top: 8px;
    display: none;
  }

  /* PORTION GUIDE */
  .portion-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .portion-item {
    background: var(--cream);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .portion-emoji { font-size: 24px; margin-bottom: 6px; }
  .portion-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 4px;
  }
  .portion-size {
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
  }
  .portion-desc {
    font-size: 11px;
    color: var(--light);
    margin-top: 2px;
    line-height: 1.4;
  }

  /* PROGRESS BAR */
  .progress-section {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
  }
  .progress-pct {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
  }
  .progress-bar {
    height: 8px;
    background: var(--green-light);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 100px;
    transition: width 0.6s ease;
  }
  .progress-weeks {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }
  .progress-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--green-light);
    border: 2px solid var(--green-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: var(--light);
    transition: all 0.3s;
  }
  .progress-dot.done {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .progress-dot.current {
    background: white;
    border-color: var(--green);
    color: var(--green);
  }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0 14px;
  }
  .section-divider-line { flex: 1; height: 1px; background: rgba(0,0,0,0.08); }
  .section-divider-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--light);
    white-space: nowrap;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--light);
  }
  .footer strong { color: var(--green); }

  /* HIDDEN */
  .week-content { display: none; }
  .week-content.active { display: block; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .week-content.active { animation: fadeUp 0.3s ease; }
</style>
</head>

const habitsData = [
  { emoji: "💧", label: "Drank enough water today" },
  { emoji: "👣", label: "Hit my step goal" },
  { emoji: "🥩", label: "Hit my protein at every meal" },
  { emoji: "😴", label: "Got 7+ hours of sleep" },
  { emoji: "🧘", label: "Did one mindset thing for myself" },
];

let currentWeek = 0;
let habits = JSON.parse(localStorage.getItem('habits_8ws') || '{}');
let exercises = JSON.parse(localStorage.getItem('exercises_8ws') || '{}');
let journals = JSON.parse(localStorage.getItem('journals_8ws') || '{}');

function saveHabits() { localStorage.setItem('habits_8ws', JSON.stringify(habits)); }
function saveExercises() { localStorage.setItem('exercises_8ws', JSON.stringify(exercises)); }
function saveJournals() { localStorage.setItem('journals_8ws', JSON.stringify(journals)); }

function getWeekPct(w) { return Math.round(((w + 1) / 8) * 100); }

function renderPills() {
  const container = document.getElementById('weekPills');
  container.innerHTML = weeks.map((w, i) => `
    <div class="week-pill ${i === currentWeek ? 'active' : ''}" onclick="switchWeek(${i})">
      Week ${w.num}
    </div>
  `).join('');
}

function switchWeek(i) {
  currentWeek = i;
  renderPills();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHabit(weekIdx, habitIdx) {
  const key = `${weekIdx}_${habitIdx}`;
  habits[key] = !habits[key];
  saveHabits();
  renderContent();
}

function toggleExercise(weekIdx, exIdx) {
  const key = `${weekIdx}_${exIdx}`;
  exercises[key] = !exercises[key];
  saveExercises();
  renderContent();
}

function saveJournal(weekIdx) {
  const val = document.getElementById(`journal_${weekIdx}`).value;
  journals[weekIdx] = val;
  saveJournals();
  const note = document.getElementById(`saved_${weekIdx}`);
  note.style.display = 'block';
  setTimeout(() => { note.style.display = 'none'; }, 2000);
}

function renderContent() {
  const w = weeks[currentWeek];
  const wi = currentWeek;
  const pct = getWeekPct(wi);

  const habitHTML = habitsData.map((h, hi) => {
    const key = `${wi}_${hi}`;
    const checked = habits[key];
    return `
      <div class="habit-item ${checked ? 'checked' : ''}" onclick="toggleHabit(${wi}, ${hi})">
        <span class="habit-emoji">${h.emoji}</span>
        <span class="habit-label">${h.label}</span>
        <div class="habit-check">${checked ? '✓' : ''}</div>
      </div>
    `;
  }).join('');

  const exerciseHTML = w.workout.map((ex, ei) => {
    const key = `${wi}_${ei}`;
    const done = exercises[key];
    return `
      <div class="exercise-item">
        <div class="exercise-num">${ei + 1}</div>
        <div class="exercise-info">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-detail">${ex.detail}</div>
        </div>
        <div class="exercise-check ${done ? 'done' : ''}" onclick="toggleExercise(${wi}, ${ei})">
          ${done ? '✓' : ''}
        </div>
      </div>
    `;
  }).join('');

  const dotsHTML = weeks.map((_, di) => {
    let cls = '';
    if (di < wi) cls = 'done';
    else if (di === wi) cls = 'current';
    return `<div class="progress-dot ${cls}">${di + 1}</div>`;
  }).join('');

  const journalVal = journals[wi] || '';

  document.getElementById('mainContent').innerHTML = `

    <div class="progress-section">
      <div class="progress-label">
        <span class="progress-title">Your Journey</span>
        <span class="progress-pct">${pct}% Complete</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${pct}%"></div>
      </div>
      <div class="progress-weeks">${dotsHTML}</div>
    </div>

    <div class="week-hero" data-week="${w.num}">
      <div class="week-hero-label">Week ${w.num} of 8</div>
      <div class="week-hero-title">${w.title}</div>
      <div class="week-hero-desc">${w.desc}</div>
    </div>

    <div class="section-divider">
      <div class="section-divider-line"></div>
      <div class="section-divider-label">This Week's Workout</div>
      <div class="section-divider-line"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon">💪</div>
        <div>
          <div class="card-title">Home Workout</div>
          <div class="card-subtitle">Check off each movement as you complete it</div>
        </div>
      </div>
      <div class="exercise-list">${exerciseHTML}</div>
    </div>

    <div class="section-divider">
      <div class="section-divider-line"></div>
      <div class="section-divider-label">Daily Habits</div>
      <div class="section-divider-line"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon">✅</div>
        <div>
          <div class="card-title">Today's Checklist</div>
          <div class="card-subtitle">Tap each habit to check it off</div>
        </div>
      </div>
      <div class="habit-list">${habitHTML}</div>
    </div>

    <div class="section-divider">
      <div class="section-divider-line"></div>
      <div class="section-divider-label">Nutrition</div>
      <div class="section-divider-line"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon">🥗</div>
        <div>
          <div class="card-title">Fueling Your Body</div>
          <div class="card-subtitle">Pre & post workout guidance</div>
        </div>
      </div>
      <div class="nutrition-block">
        <div class="nutrition-card">
          <div class="nutrition-card-title">Before</div>
          <p>${w.nutrition_pre}</p>
        </div>
        <div class="nutrition-card">
          <div class="nutrition-card-title">After</div>
          <p>${w.nutrition_post}</p>
        </div>
      </div>
      <div class="nutrition-tip">💡 ${w.nutrition_tip}</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon">✋</div>
        <div>
          <div class="card-title">Portion Guide</div>
          <div class="card-subtitle">Use your hand as your measuring tool</div>
        </div>
      </div>
      <div class="portion-grid">
        <div class="portion-item">
          <div class="portion-emoji">🥩</div>
          <div class="portion-name">Protein</div>
          <div class="portion-size">Palm size</div>
          <div class="portion-desc">Chicken, fish, eggs, Greek yogurt</div>
        </div>
        <div class="portion-item">
          <div class="portion-emoji">🥦</div>
          <div class="portion-name">Vegetables</div>
          <div class="portion-size">Fist size</div>
          <div class="portion-desc">Fill half your plate — always</div>
        </div>
        <div class="portion-item">
          <div class="portion-emoji">🍚</div>
          <div class="portion-name">Carbs</div>
          <div class="portion-size">Cupped hand</div>
          <div class="portion-desc">Rice, oats, sweet potato, fruit</div>
        </div>
        <div class="portion-item">
          <div class="portion-emoji">🥑</div>
          <div class="portion-name">Healthy Fat</div>
          <div class="portion-size">Thumb size</div>
          <div class="portion-desc">Avocado, olive oil, nuts</div>
        </div>
      </div>
    </div>

    <div class="section-divider">
      <div class="section-divider-line"></div>
      <div class="section-divider-label">Mindset & Journal</div>
      <div class="section-divider-line"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon">📓</div>
        <div>
          <div class="card-title">This Week's Reflection</div>
          <div class="card-subtitle">Your thoughts stay here — private and yours</div>
        </div>
      </div>
      <div class="journal-prompt">${w.journal}</div>
      <textarea class="journal-textarea" id="journal_${wi}" placeholder="Write freely...">${journalVal}</textarea>
      <button class="save-btn" onclick="saveJournal(${wi})">Save My Reflection</button>
      <div class="saved-note" id="saved_${wi}">✓ Saved</div>
    </div>

    <div class="card" style="background: var(--green-light); border: 1px solid rgba(74,124,89,0.2);">
      <div class="card-header">
        <div class="card-icon" style="background: white;">🎯</div>
        <div>
          <div class="card-title" style="color: var(--green-dark);">Week ${w.num} Focus</div>
        </div>
      </div>
      <p style="font-size: 14px; color: var(--mid); line-height: 1.7; font-style: italic;">${w.week_focus}</p>
    </div>

    ${wi === 7 ? `
    <div class="card" style="background: var(--green); text-align: center; padding: 28px;">
      <div style="font-size: 40px; margin-bottom: 12px;">🏆</div>
      <div style="font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: white; margin-bottom: 8px;">You Finished 8 Week Strong</div>
      <div style="font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.6; margin-bottom: 16px;">This is just the beginning. Group training starts now — your spot is waiting.</div>
      <div style="background: rgba(255,255,255,0.15); border-radius: 10px; padding: 14px; color: white;">
        <div style="font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; opacity: 0.7;">Next Step</div>
        <div style="font-weight: 700; font-size: 15px;">Join Group Training</div>
        <div style="font-size: 13px; opacity: 0.8; margin-top: 4px;">Once/week $200/mo · Twice/week $400/mo</div>
      </div>
    </div>
    ` : ''}
  `;
}

renderPills();
renderContent();
</script>
</body>
</html>
